theme = "base16_default_dark"

[editor]
line-number = "relative"
mouse = false
cursorline =  false
bufferline = "never"
color-modes = false
auto-format = false
idle-timeout = 400
completion-trigger-len = 2
scrolloff = 3

[editor.statusline]
left = ["mode", "file-name"]
center = []
right = ["position"]

[editor.lsp]
display-inlay-hints = false
display-signature-help-docs = false

[editor.cursor-shape]
insert = "bar"

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
"$" = "goto_line_end"
"0" = "goto_line_start"
C-f = ":format"
